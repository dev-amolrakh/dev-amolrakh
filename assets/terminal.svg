<svg width="820" height="360" viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="winGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#161b22"/>
    <stop offset="100%" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#1c2333"/>
    <stop offset="100%" stop-color="#11151d"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.55"/>
  </filter>
  <style>
    text { font-family: 'Fira Code','Courier New',monospace; }
    .line { opacity: 0; animation: fadeIn 0.4s ease-out forwards; }
    .l1  { animation-delay: 0.2s; }
    .l2  { animation-delay: 0.9s; }
    .l3  { animation-delay: 1.6s; }
    .l4  { animation-delay: 2.3s; }
    .l5  { animation-delay: 3.0s; }
    .l6  { animation-delay: 3.7s; }
    .l7  { animation-delay: 4.4s; }
    .l8  { animation-delay: 5.1s; }
    .l9  { animation-delay: 5.8s; }
    .l10 { animation-delay: 6.5s; }
    .l11 { animation-delay: 7.2s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .blk { animation: blink 1s steps(1) infinite; }
    @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    .dot { filter: drop-shadow(0 0 2px rgba(0,0,0,0.4)); }
  </style>
</defs>

<rect x="8" y="8" width="804" height="344" rx="14" fill="url(#winGrad)" filter="url(#shadow)"/>
